<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>会写歌的小森</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #fdf0ed 0%, #f5e4de 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .logo-stage {
    position: relative;
    width: 460px;
    height: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid #c9908a;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .ring-1 { width: 430px; height: 430px; opacity: 0.3; }
  .ring-2 { width: 460px; height: 460px; opacity: 0.15; }

  .logo-circle {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #c9908a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    position: relative;
    z-index: 1;
  }

  .logo-name {
    font-family: STSong, 'SimSun', '宋体', serif;
    font-size: 50px;
    color: #ffffff;
    letter-spacing: 4px;
    line-height: 1;
  }

  .logo-notes {
    font-size: 28px;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 10px;
    line-height: 1;
  }

  .logo-caption {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .caption-main {
    font-family: STSong, 'SimSun', '宋体', serif;
    font-size: 18px;
    color: #2d2926;
    letter-spacing: 3px;
  }

  .caption-sub {
    font-size: 12px;
    color: #b0a09a;
    letter-spacing: 1.5px;
  }

  @media (max-width: 480px) {
    .logo-stage { width: 320px; height: 320px; }
    .logo-circle { width: 280px; height: 280px; }
    .ring-1 { width: 300px; height: 300px; }
    .ring-2 { width: 320px; height: 320px; }
    .logo-name { font-size: 38px; }
    .logo-notes { font-size: 22px; }
  }
</style>
</head>
<body>

  <div class="logo-stage">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="logo-circle">
      <span class="logo-name">小森</span>
      <span class="logo-notes">♪ ♫</span>
    </div>
  </div>

  <div class="logo-caption">
    <span class="caption-main">会写歌的小森</span>
    <span class="caption-sub">把你的故事做成一首歌</span>
  </div>

</body>
</html>
