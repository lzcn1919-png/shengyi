<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会写歌的小森 · Logo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei UI', 'Hiragino Sans GB', sans-serif;
    background: #fdf8f4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(201,144,138,0.22), 0 2px 8px rgba(196,168,130,0.12);
  }

  .logo-text {
    font-size: 17px;
    letter-spacing: 0.12em;
    color: #7a6058;
    font-weight: 500;
  }

  /* Preview section */
  .previews {
    display: flex;
    gap: 40px;
    align-items: flex-end;
  }

  .preview-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .preview-label {
    font-size: 12px;
    color: #c0b9b2;
    letter-spacing: 0.06em;
  }

  .size-sm .logo-circle { width: 64px; height: 64px; }
  .size-sm .logo-text { font-size: 11px; }

  .size-md .logo-circle { width: 120px; height: 120px; }
  .size-md .logo-text { font-size: 14px; }

  .size-lg .logo-circle { width: 180px; height: 180px; }
  .size-lg .logo-text { font-size: 17px; }
</style>
</head>
<body>

<div class="previews">
  <div class="preview-item size-sm">
    <div class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">

            <radialGradient id="bgGrad-sm" cx="50%" cy="45%" r="60%">

            </radialGradient>
          </defs>
          <!-- Background -->

          <!-- Hair back -->

          <!-- Neck -->
          <rect x="82" y="118" width="16" height="14" rx="6" fill="#f5d5c8"/>
          <!-- Face -->
          <ellipse cx="90" cy="96" rx="30" ry="33" fill="#fae0d4"/>
          <!-- Hair top -->
          <ellipse cx="90" cy="64" rx="38" ry="22" fill="#8b5e52"/>
          <!-- Hair side left -->
          <path d="M56 80 Q50 105 58 118 Q65 108 68 96 Z" fill="#8b5e52"/>
          <!-- Hair side right -->
          <path d="M124 80 Q130 105 122 118 Q115 108 112 96 Z" fill="#8b5e52"/>
          <!-- Hair fringe -->
          <path d="M62 72 Q68 58 90 56 Q112 58 118 72 Q108 66 90 67 Q72 66 62 72 Z" fill="#a07060"/>
          <!-- Eyes -->
          <ellipse cx="79" cy="93" rx="5" ry="5.5" fill="#3a2820"/>
          <ellipse cx="101" cy="93" rx="5" ry="5.5" fill="#3a2820"/>
          <!-- Eye shine -->
          <circle cx="81" cy="91" r="1.5" fill="white"/>
          <circle cx="103" cy="91" r="1.5" fill="white"/>
          <!-- Eyelashes -->
          <path d="M74 89 Q76 86 79 88" stroke="#3a2820" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <path d="M106 89 Q104 86 101 88" stroke="#3a2820" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- Nose -->

          <!-- Mouth -->
          <path d="M83 108 Q90 114 97 108" stroke="#c97a6a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

          <!-- Blush right -->
          <ellipse cx="108" cy="103" rx="8" ry="5" fill="#f0a898" opacity="0.45"/>

          <!-- Music note left -->
          <g transform="translate(30, 48)" opacity="0.6">
            <text font-size="16" fill="#c9908a" font-family="serif">♪</text>
          </g>
          <!-- Music note right -->
          <g transform="translate(128, 58)" opacity="0.5">
            <text font-size="12" fill="#c4a882" font-family="serif">♫</text>
          </g>
          <!-- Sparkle top -->
          <g transform="translate(108, 38)" opacity="0.55">
            <line x1="0" y1="-7" x2="0" y2="7" stroke="#c4a882" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="-7" y1="0" x2="7" y2="0" stroke="#c4a882" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="-4" y1="-4" x2="4" y2="4" stroke="#c4a882" stroke-width="0.8" stroke-linecap="round"/>
            <line x1="4" y1="-4" x2="-4" y2="4" stroke="#c4a882" stroke-width="0.8" stroke-linecap="round"/>
          </g>
        </svg>

      <span class="logo-text">会写歌的小森</span>
